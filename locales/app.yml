_version: 2
welcome:
  en: >
   I'm a reminder bot. Send me a reminder in this format:
   !remind me %{date} [at] 15:30 <reminder text>. You can replace the month number with its name,
   use words "today" or "tomorrow". If no time was specified the reminder will arrive at 09:00.
   I'll send it to you in a shared or private chat.
  ru: >
    Я — бот-напоминалка. Отправьте мне напоминание в формате:
    !напомни %{date} [в] 15:30 <текст напоминания>. Вы можете заменить число месяца его названием,
    дату — на слова "сегодня" или "завтра" и не указывать время — тогда напоминание придет в 09:00.
    Я отправлю вам его в общем или личном чате.
reminder:
  saved:
    en: >
      Accepted! Reminder on %{date} at %{hour}:%{min}
    ru: >
      Принято! Напомню %{date} в %{hour}:%{min}
  new:
    en: >
      🟢 Reminder for you: %{text}
    ru: >
      🟢 Вам напоминание: %{text}
  summary:
    en: |
      Missed reminders in this room: %{sum}
    ru: |
      Пропущенные напоминания в этой комнате:: %{sum}
recovery:
  verification-with-key-failure:
    en: Can not verify device with this key
    ru: Ни один из источников не предоставил recovery key
